<!doctype html>
<html lang="ar">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI Video Studio Pro" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Performance & Optimization -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="color-scheme" content="dark" />
    
    <!-- DNS Prefetch for External Resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <title>AI Video Studio Pro - محرر فيديو احترافي بدون إنترنت</title>
    <meta name="description" content="محرر فيديو قوي يعمل بالكامل محلياً على جهازك. معالجة سريعة، خصوصية مطلقة، وأنماط بصرية احترافية." />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" as="style" href="/src/index.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f172a' width='100' height='100'/><rect fill='%2306b6d4' x='20' y='20' width='60' height='60' rx='8'/><circle fill='%230f172a' cx='50' cy='50' r='20'/></svg>" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body class="bg-slate-900 text-slate-50">
    <div id="root"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Analytics Script (Async) -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
      data-domains="localhost,127.0.0.1"></script>
    
    <!-- Service Worker Registration for PWA Support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed, app will still work
          });
        });
      }
      
      // Prevent zooming on double-tap for better mobile UX
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </body>

</html>
